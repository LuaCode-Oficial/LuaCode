<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodePaste | Compartilhe seu código</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: rgba(30, 41, 59, 0.7);
            --surface-border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981;
            --font-mono: 'Fira Code', 'Courier New', Courier, monospace;
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #1e293b, transparent 40%),
                              radial-gradient(circle at bottom left, #0f172a, transparent 40%);
            color: var(--text-main);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Esconder tudo no modo RAW */
        body.raw-mode {
            background: #000;
            display: block;
        }
        body.raw-mode pre {
            color: #d4d4d4;
            font-family: var(--font-mono);
            font-size: 14px;
            padding: 20px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            flex: 1;
        }

        /* Header e Botões */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--surface-border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .logo { font-size: 1.25rem; font-weight: bold; display: flex; align-items: center; gap: 0.5rem; }
        .logo i { color: var(--primary); }

        .actions { display: flex; gap: 0.75rem; }

        .btn {
            background: #334155;
            color: var(--text-main);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn:hover { background: #475569; transform: translateY(-1px); }
        .btn-primary { background: var(--primary); }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-hidden { display: none !important; }

        /* Área de Edição */
        .editor-wrapper {
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            border: 1px solid var(--surface-border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .title-input {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: none;
            border-bottom: 1px solid var(--surface-border);
            color: var(--text-main);
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: var(--font-sans);
            outline: none;
        }

        .title-input::placeholder { color: var(--text-muted); }
        .title-input:disabled { background: rgba(0,0,0,0.3); opacity: 0.8; }

        .code-area {
            display: flex;
            flex: 1;
            position: relative;
            background: rgba(15, 23, 42, 0.6);
        }

        .line-numbers {
            padding: 1rem 0.5rem;
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-size: 14px;
            line-height: 1.5;
            text-align: right;
            user-select: none;
            border-right: 1px solid var(--surface-border);
            overflow: hidden;
            min-width: 40px;
        }

        textarea {
            width: 100%;
            background: transparent;
            color: #e2e8f0;
            border: none;
            padding: 1rem;
            font-family: var(--font-mono);
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            outline: none;
            white-space: pre;
            overflow: auto;
        }

        textarea:disabled { opacity: 0.9; }

        /* Scrollbars customizados */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        /* Toast de Feedback */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 999px;
            font-weight: 500;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            z-index: 1000;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* Loader */
        .loader { display: none; margin: auto; text-align: center; color: var(--primary); font-size: 2rem; }
        
        @media (max-width: 600px) {
            .container { padding: 1rem; }
            .btn span { display: none; }
            .btn { padding: 0.5rem; }
        }
    </style>
</head>
<body>

    <div class="container" id="app-container">
        <header>
            <div class="logo">
                <i class="fa-solid fa-code"></i> CodePaste
            </div>
            <div class="actions">
                <button id="btn-save" class="btn btn-primary" onclick="savePaste()">
                    <i class="fa-solid fa-floppy-disk"></i> <span>Salvar</span>
                </button>
                <button id="btn-copy" class="btn btn-hidden" onclick="copyLink()">
                    <i class="fa-solid fa-link"></i> <span>Copiar Link</span>
                </button>
                <button id="btn-raw" class="btn btn-hidden" onclick="openRaw()">
                    <i class="fa-solid fa-file-lines"></i> <span>RAW</span>
                </button>
                <button id="btn-new" class="btn btn-hidden" onclick="window.location.href='/'">
                    <i class="fa-solid fa-plus"></i> <span>Novo</span>
                </button>
            </div>
        </header>

        <div class="editor-wrapper" id="editor-wrapper">
            <input type="text" id="title" class="title-input" placeholder="Título do arquivo (opcional)" autocomplete="off">
            <div class="code-area">
                <div class="line-numbers" id="line-numbers">1</div>
                <textarea id="editor" spellcheck="false" wrap="off" placeholder="Cole seu código ou texto aqui..."></textarea>
            </div>
        </div>
        
        <div class="loader" id="loader">
            <i class="fa-solid fa-circle-notch fa-spin"></i>
        </div>
    </div>

    <div class="toast" id="toast">
        <i class="fa-solid fa-check"></i> <span id="toast-msg">Salvo com sucesso!</span>
    </div>

    <script>
        // ==========================================
        // 1. CONFIGURAÇÃO DO SUPABASE
        // ==========================================
        const SUPABASE_URL = 'https://vnwmfxltrrwyxxjfymog.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_6GiromAHzwc1yip59KYpjw_Rgy7cAsX';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Elementos DOM
        const editor = document.getElementById('editor');
        const lineNumbers = document.getElementById('line-numbers');
        const titleInput = document.getElementById('title');
        const btnSave = document.getElementById('btn-save');
        const btnCopy = document.getElementById('btn-copy');
        const btnRaw = document.getElementById('btn-raw');
        const btnNew = document.getElementById('btn-new');
        const appContainer = document.getElementById('app-container');
        const editorWrapper = document.getElementById('editor-wrapper');
        const loader = document.getElementById('loader');

        // ==========================================
        // 2. SISTEMA DE CONTADOR DE LINHAS
        // ==========================================
        function updateLineNumbers() {
            const lines = editor.value.split('\n').length;
            lineNumbers.innerHTML = Array(lines).fill(0).map((_, i) => i + 1).join('<br>');
        }

        editor.addEventListener('input', updateLineNumbers);
        editor.addEventListener('scroll', () => {
            lineNumbers.scrollTop = editor.scrollTop;
        });

        // ==========================================
        // 3. LÓGICA DE ROTEAMENTO (URL Params)
        // ==========================================
        const urlParams = new URLSearchParams(window.location.search);
        const pasteSlug = urlParams.get('paste');
        const rawSlug = urlParams.get('raw');

        async function init() {
            if (rawSlug) {
                // MODO RAW
                document.body.className = 'raw-mode';
                appContainer.style.display = 'none';
                await loadData(rawSlug, true);
            } else if (pasteSlug) {
                // MODO VISUALIZAÇÃO
                setLoading(true);
                await loadData(pasteSlug, false);
                setLoading(false);
            }
            // Se nenhum dos dois, continua no modo de criação limpo.
        }

        async function loadData(slug, isRaw) {
            try {
                const { data, error } = await supabase
                    .from('questi')
                    .select('*')
                    .eq('slug', slug)
                    .single();

                if (error || !data) {
                    if (isRaw) document.body.innerHTML = '<pre>404 - Paste não encontrado</pre>';
                    else showToast('Paste não encontrado', true);
                    return;
                }

                if (isRaw) {
                    // Renderiza página puramente RAW
                    const pre = document.createElement('pre');
                    pre.textContent = data.content;
                    document.body.appendChild(pre);
                    document.title = data.title ? `${data.title} - RAW` : 'RAW Paste';
                } else {
                    // Preenche os dados no modo leitura
                    titleInput.value = data.title;
                    editor.value = data.content;
                    titleInput.disabled = true;
                    editor.disabled = true;
                    updateLineNumbers();
                    document.title = data.title ? `${data.title} - CodePaste` : 'Visualizando - CodePaste';

                    // Atualiza botões
                    btnSave.classList.add('btn-hidden');
                    btnCopy.classList.remove('btn-hidden');
                    btnRaw.classList.remove('btn-hidden');
                    btnNew.classList.remove('btn-hidden');
                }
            } catch (err) {
                console.error(err);
            }
        }

        // ==========================================
        // 4. SISTEMA DE SALVAMENTO (CREATE)
        // ==========================================
        function generateSlug() {
            return Math.random().toString(36).substring(2, 8) + Math.random().toString(36).substring(2, 6);
        }

        async function savePaste() {
            const content = editor.value.trim();
            if (!content) {
                showToast('O conteúdo não pode estar vazio!', true);
                return;
            }

            btnSave.disabled = true;
            btnSave.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> <span>Salvando...</span>';

            const slug = generateSlug();
            const title = titleInput.value.trim() || 'Sem Título';

            const { data, error } = await supabase
                .from('questi')
                .insert([{ title, content, slug }])
                .select();

            if (error) {
                showToast('Erro ao salvar!', true);
                btnSave.disabled = false;
                btnSave.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> <span>Salvar</span>';
                return;
            }

            // Sucesso! Muda a URL sem recarregar a página e atualiza interface
            const newUrl = `${window.location.origin}${window.location.pathname}?paste=${slug}`;
            window.history.pushState({ path: newUrl }, '', newUrl);
            
            showToast('Salvo com sucesso!');
            
            titleInput.disabled = true;
            editor.disabled = true;
            btnSave.classList.add('btn-hidden');
            btnCopy.classList.remove('btn-hidden');
            btnRaw.classList.remove('btn-hidden');
            btnNew.classList.remove('btn-hidden');

            // Copia o link automaticamente como solicitado
            copyLink(true);
        }

        // ==========================================
        // 5. FUNÇÕES AUXILIARES
        // ==========================================
        function copyLink(isAuto = false) {
            const link = window.location.href;
            navigator.clipboard.writeText(link).then(() => {
                showToast(isAuto ? 'Salvo e link copiado!' : 'Link copiado!');
            });
        }

        function openRaw() {
            const currentSlug = new URLSearchParams(window.location.search).get('paste');
            // Como tudo está em um arquivo, usamos ?raw= para simular a rota raw do backend
            const rawUrl = `${window.location.origin}${window.location.pathname}?raw=${currentSlug}`;
            window.open(rawUrl, '_blank');
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = message;
            toast.style.backgroundColor = isError ? '#ef4444' : 'var(--accent)';
            toast.querySelector('i').className = isError ? 'fa-solid fa-circle-xmark' : 'fa-solid fa-check';
            
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        function setLoading(isLoading) {
            if (isLoading) {
                editorWrapper.style.display = 'none';
                loader.style.display = 'block';
            } else {
                editorWrapper.style.display = 'flex';
                loader.style.display = 'none';
            }
        }

        // Inicializa o app
        init();

        // Evita perder a indentação ao apertar TAB
        editor.addEventListener('keydown', function(e) {
            if (e.key == 'Tab') {
                e.preventDefault();
                var start = this.selectionStart;
                var end = this.selectionEnd;
                this.value = this.value.substring(0, start) + "\t" + this.value.substring(end);
                this.selectionStart = this.selectionEnd = start + 1;
            }
        });
    </script>
</body>
</html>
